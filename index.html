<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xiangyu Su</title>
  <meta name="description" content="Personal homepage of Xiangyu Su, a CS/AI/ML researcher." />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/32.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="assets/favicons/64.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="assets/favicons/512.png" />
  <link rel="apple-touch-icon" href="assets/favicons/apple-touch.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..900,0..100,0..1;1,9..144,300..900,0..100,0..1&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Noto+Serif+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=40" />

  <!-- FOUC prevention: set theme before first paint -->
  <script>
    (function () {
      var stored = localStorage.getItem('theme');
      var theme = stored || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>

<label class="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
  <input type="checkbox" id="themeToggle">
  <span class="icon-sun">☀️</span>
  <span class="icon-moon">🌙</span>
</label>

<div class="container">

  <!-- ======================================================
       HERO
       ====================================================== -->
  <section class="hero-block" aria-label="Introduction">

    <div class="hero-bottom">
      <div class="hero-top-row">
        <div class="hero-photo" aria-label="Photo">
          <div class="hero-photo-placeholder">Photo</div>
        </div>
        <div class="hero-meta">
          <h1 class="hero-title"></h1>
          <div class="hero-affil"></div>
          <div class="social-links"></div>
        </div>
      </div>
      <p class="bio"></p>
    </div>

  </section>

  <hr />

  <!-- ======================================================
       RESEARCH
       ====================================================== -->
  <section aria-label="Research">
    <h2 class="section-title">Research</h2>
    <div class="research-prose"></div>
  </section>

  <hr class="interests-hr" />

  <!-- ======================================================
       RESEARCH INTERESTS
       ====================================================== -->
  <section aria-label="Research Interests" class="interests-section">
    <h2 class="section-title">Research Interests</h2>
    <div class="interests-list"></div>
  </section>

  <hr />

  <!-- ======================================================
       PUBLICATIONS
       ====================================================== -->
  <section aria-label="Publications">
    <h2 class="section-title">Publications</h2>

    <div class="pub-list"></div>
  </section>

  <hr class="exp-hr" />

  <!-- ======================================================
       EXPERIENCE
       ====================================================== -->
  <section aria-label="Experience" class="exp-section">
    <h2 class="section-title">Experience</h2>
    <div class="exp-list"></div>
  </section>

  <!-- ======================================================
       FOOTER
       ====================================================== -->
  <footer class="site-footer">
    Xiangyu Su · 2026 · Built with <img class="claude-logo" src="assets/brands/claude-code.png" alt="" aria-hidden="true"><span class="footer-cc">Claude Code</span>
  </footer>

</div><!-- /.container -->

<script>
  var html = document.documentElement;

  // ── Transitions (avoid FOUC) ──────────────────────────────
  requestAnimationFrame(function () {
    requestAnimationFrame(function () {
      html.classList.add('transitions-ready');
    });
  });

  // ── Theme toggle ──────────────────────────────────────────
  var themeCheckbox = document.getElementById('themeToggle');

  function applyTheme(theme) {
    html.setAttribute('data-theme', theme);
    themeCheckbox.checked = (theme === 'dark');
  }

  applyTheme(html.getAttribute('data-theme') || 'light');

  themeCheckbox.addEventListener('change', function () {
    var next = this.checked ? 'dark' : 'light';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });

  // ── Content loader (content.md → DOM) ─────────────────────
  (function () {
    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    // Inline markdown: [text](url) + **bold**. Escapes HTML first so raw tags are safe.
    function renderInline(s) {
      var out = escapeHtml(s);
      out = out.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, function (_, text, url) {
        var external = /^https?:\/\//i.test(url);
        var attrs = external ? ' target="_blank" rel="noopener"' : '';
        return '<a href="' + url + '"' + attrs + '>' + text + '</a>';
      });
      out = out.replace(/==(.+?)==/g, '<mark>$1</mark>');
      out = out.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      return out;
    }

    function stripInlineComment(line) {
      var m = line.match(/^([^#]*?)\s+#.*$/);
      return m ? m[1] : line;
    }

    function isPlaceholder(s) {
      return /^（[^）]*）$/.test(s.trim());
    }

    function parseSections(md) {
      var sections = {};
      var parts = md.split(/\n## /);
      for (var i = 1; i < parts.length; i++) {
        var nl = parts[i].indexOf('\n');
        var name = (nl >= 0 ? parts[i].slice(0, nl) : parts[i]).trim();
        var body = nl >= 0 ? parts[i].slice(nl + 1) : '';
        // Trim the trailing top-level '---' separator
        body = body.replace(/\n---\s*$/, '').trim();
        sections[name] = body;
      }
      return sections;
    }

    function parseKV(text) {
      var result = {};
      if (!text) return result;
      var lines = text.split('\n');
      for (var i = 0; i < lines.length; i++) {
        var line = stripInlineComment(lines[i]).trim();
        if (!line || line.charAt(0) === '#') continue;
        if (line.indexOf('---') === 0) continue;
        var m = line.match(/^([a-z_]+)\s*:\s*(.*)$/i);
        if (m) result[m[1].toLowerCase()] = m[2].trim();
      }
      return result;
    }

    function parseProse(text) {
      // Split into paragraphs by blank lines, collapse intra-paragraph newlines to spaces
      var paragraphs = (text || '').split(/\n\s*\n/).map(function (p) {
        return p.split('\n').map(function (l) { return l.trim(); }).filter(Boolean).join(' ').trim();
      }).filter(Boolean);
      if (paragraphs.length === 1 && isPlaceholder(paragraphs[0])) return [];
      return paragraphs;
    }

    function parseBilingual(text) {
      var result = { en: [], zh: [] };
      if (!text) return result;
      var enMatch = text.match(/### English\s*\n([\s\S]*?)(?=\n### |$)/);
      var zhMatch = text.match(/### 中文\s*\n([\s\S]*?)(?=\n### |$)/);
      if (enMatch) result.en = parseProse(enMatch[1]);
      if (zhMatch) result.zh = parseProse(zhMatch[1]);
      return result;
    }

    function parsePubs(text) {
      if (!text) return [];
      var blocks = text.split(/\n\[\[paper\]\]\s*\n?/);
      blocks.shift(); // drop preamble before first [[paper]]
      return blocks.map(parsePub).filter(function (p) { return p.title; });
    }

    function parsePub(block) {
      var result = { coverage: [] };
      var lines = block.split('\n');
      for (var i = 0; i < lines.length; i++) {
        var raw = lines[i];
        var stripped = stripInlineComment(raw);
        var line = stripped.trim();
        if (!line) continue;
        if (line.indexOf('---') === 0) break;
        if (line.charAt(0) === '#') continue;
        var m = stripped.match(/^([a-z_]+)\s*:\s*(.*)$/i);
        if (!m) continue;
        var key = m[1].toLowerCase();
        var value = m[2].trim();
        if (key === 'coverage') {
          while (i + 1 < lines.length && /^\s{2,}\S/.test(lines[i + 1])) {
            i++;
            var entry = lines[i].trim();
            if (!entry || entry.charAt(0) === '#') continue;
            var covParts = entry.split('|').map(function (s) { return s.trim(); });
            if (covParts[0]) {
              result.coverage.push({
                name: covParts[0],
                url: covParts[1] || '',
                logo: covParts[2] || ''
              });
            }
          }
          continue;
        }
        result[key] = value;
      }
      return result;
    }

    function parseExperience(text) {
      if (!text) return [];
      var blocks = text.split(/\n\[\[(?:experience|award|internship)\]\]\s*\n?/);
      blocks.shift();
      return blocks.map(function (block) {
        var item = {};
        var lines = block.split('\n');
        for (var i = 0; i < lines.length; i++) {
          var stripped = stripInlineComment(lines[i]);
          var line = stripped.trim();
          if (!line || line.charAt(0) === '#' || line.indexOf('---') === 0) {
            if (line.indexOf('---') === 0) break;
            continue;
          }
          var m = stripped.match(/^([a-z_]+)\s*:\s*(.*)$/i);
          if (m) item[m[1].toLowerCase()] = m[2].trim();
        }
        return item;
      }).filter(function (it) { return it.title; });
    }

    function parseLife(text) {
      if (!text) return [];
      var items = [];
      var lines = text.split('\n');
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i].trim();
        if (line.indexOf('- ') !== 0) continue;
        var parts = line.slice(2).split('|').map(function (s) { return s.trim(); });
        if (parts.length >= 3) {
          items.push({ emoji: parts[0], en: parts[1], zh: parts[2] });
        }
      }
      return items;
    }

    function parseInterests(text) {
      if (!text) return { kind: 'empty' };
      var lines = text.split('\n');
      var hasBullet = lines.some(function (l) { return l.trim().indexOf('- ') === 0; });
      if (hasBullet) {
        var items = [];
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (line.indexOf('- ') !== 0) continue;
          var parts = line.slice(2).split('|').map(function (s) { return s.trim(); });
          if (!parts[0]) continue;
          items.push({ topic: parts[0], desc: parts[1] || '' });
        }
        return { kind: 'list', items: items };
      }
      // Prose fallback: strip comment / blank lines, group paragraphs
      var body = lines.filter(function (l) {
        var t = l.trim();
        return t && t.charAt(0) !== '#';
      }).join('\n');
      return { kind: 'prose', paragraphs: parseProse(body) };
    }

    function parseMd(md) {
      var s = parseSections(md);
      return {
        basicInfo: parseKV(s['Basic Info']),
        bio: parseBilingual(s['Bio']),
        social: parseKV(s['Social Links']),
        research: parseBilingual(s['Research']),
        interests: parseInterests(s['Research Interests']),
        publications: parsePubs(s['Publications']),
        experience: parseExperience(s['Experience']),
        life: parseLife(s['Life']),
        contact: parseKV(s['Contact'])
      };
    }

    // ── Social icons ──
    var SOCIAL_ORDER = ['email', 'github', 'twitter', 'scholar', 'cv', 'website'];
    var SOCIAL_ICONS = {
      email: {
        label: 'Email',
        svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>',
        href: function (v) { return 'mailto:' + v; },
        external: false
      },
      github: {
        label: 'GitHub',
        svg: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>',
        href: function (v) { return v.indexOf('http') === 0 ? v : 'https://github.com/' + v; },
        external: true
      },
      twitter: {
        label: 'Twitter',
        svg: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>',
        href: function (v) { return v.indexOf('http') === 0 ? v : 'https://twitter.com/' + v; },
        external: true
      },
      scholar: {
        label: 'Scholar',
        svg: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M5.242 13.769L.5 9.5 12 1l11.5 8.5-4.742 4.269C17.548 11.249 14.978 9.5 12 9.5c-2.977 0-5.548 1.748-6.758 4.269zM12 10a7 7 0 1 0 0 14 7 7 0 0 0 0-14z"/></svg>',
        href: function (v) { return v; },
        external: true
      },
      cv: {
        label: 'CV',
        svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>',
        href: function (v) { return v; },
        external: true
      },
      website: {
        label: 'Website',
        svg: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>',
        href: function (v) { return v; },
        external: true
      }
    };

    function socialLinksHtml(social) {
      var out = [];
      for (var i = 0; i < SOCIAL_ORDER.length; i++) {
        var key = SOCIAL_ORDER[i];
        var v = social[key];
        if (!v) continue;
        var cfg = SOCIAL_ICONS[key];
        var href = cfg.href(v);
        var targetAttrs = cfg.external ? ' target="_blank" rel="noopener"' : '';
        out.push(
          '<a href="' + escapeHtml(href) + '" class="social-icon" aria-label="' + cfg.label + '"' + targetAttrs + '>' +
          cfg.svg + '<span class="social-label">' + cfg.label + '</span>' +
          '</a>'
        );
      }
      return out.join('');
    }

    // ── Renderers ──
    function renderHero(data) {
      var name = data.basicInfo.name || '';
      var nameZh = data.basicInfo.name_zh || '';
      var titleEl = document.querySelector('.hero-title');
      if (nameZh) {
        titleEl.innerHTML = escapeHtml(name) +
          '<span class="hero-title-sep">·</span>' +
          '<span class="hero-title-zh">' + escapeHtml(nameZh) + '</span>';
      } else {
        titleEl.textContent = name;
      }

      var affilEl = document.querySelector('.hero-affil');
      if (affilEl) {
        var affil = data.basicInfo.affil || '';
        if (affil) {
          affilEl.innerHTML = renderInline(affil);
        } else {
          affilEl.remove();
        }
      }

      var bioPlaceholder = document.querySelector('.bio');
      if (bioPlaceholder) {
        if (!data.bio.en.length) {
          bioPlaceholder.remove();
        } else {
          var parent = bioPlaceholder.parentNode;
          data.bio.en.forEach(function (text) {
            var p = document.createElement('p');
            p.className = 'bio';
            p.innerHTML = renderInline(text);
            parent.insertBefore(p, bioPlaceholder);
          });
          bioPlaceholder.remove();
        }
      }

      if (data.basicInfo.photo) {
        var photoEl = document.querySelector('.hero-photo');
        photoEl.innerHTML = '<img src="' + escapeHtml(data.basicInfo.photo) + '" alt="' + escapeHtml(name) + '">';
      }

      document.querySelector('.hero-bottom .social-links').innerHTML = socialLinksHtml(data.social);
    }

    function renderResearch(research) {
      var el = document.querySelector('.research-prose');
      if (!el) return;
      var section = el.closest('section');
      var hr = section ? section.previousElementSibling : null;

      if (!research.en.length) {
        if (section) section.style.display = 'none';
        if (hr && hr.tagName === 'HR') hr.style.display = 'none';
        return;
      }

      el.innerHTML = research.en.map(function (p) {
        return '<p>' + renderInline(p) + '</p>';
      }).join('');
    }

    function renderPubItem(p) {
        var thumbHtml = p.thumb
          ? '<img src="' + escapeHtml(p.thumb) + '" alt="">'
          : '<div class="pub-thumb-placeholder"></div>';

        var categoryHtml = p.category
          ? '<div class="pub-category">' + escapeHtml(p.category) + '</div>'
          : '';

        var toplineItems = [];
        if (p.venue)       toplineItems.push('<span class="pub-venue">' + escapeHtml(p.venue) + '</span>');
        if (p.project_url) toplineItems.push('<a href="' + escapeHtml(p.project_url) + '" target="_blank" rel="noopener">Project Page</a>');
        if (p.paper_url)   toplineItems.push('<a href="' + escapeHtml(p.paper_url)   + '" target="_blank" rel="noopener">Paper</a>');
        if (p.code_url)    toplineItems.push('<a href="' + escapeHtml(p.code_url)    + '" target="_blank" rel="noopener">Code</a>');
        var toplineHtml = toplineItems.length
          ? '<div class="pub-topline">' + toplineItems.join('<span class="pub-topline-sep" aria-hidden="true">·</span>') + '</div>'
          : '';

        var summaryHtml = p.summary_en
          ? '<div class="pub-summary">' + renderInline(p.summary_en) + '</div>'
          : '';

        function pubTag(modifier, label, name, url, logo) {
          var tag = 'span', hrefAttr = '';
          if (url) {
            tag = 'a';
            hrefAttr = ' href="' + escapeHtml(url) + '" target="_blank" rel="noopener"';
          }
          var iconHtml = logo
            ? '<img class="pub-tag-logo" src="' + escapeHtml(logo) + '" alt="" aria-hidden="true">'
            : '<span class="pub-tag-marker" aria-hidden="true"></span>';
          return '<' + tag + ' class="pub-tag' + (modifier ? ' pub-tag--' + modifier : '') + '"' + hrefAttr + '>' +
            '<span class="pub-tag-label">' + escapeHtml(label) + '</span>' +
            '<span class="pub-tag-sep" aria-hidden="true"></span>' +
            '<span class="pub-tag-brand">' +
              iconHtml +
              '<span class="pub-tag-value">' + escapeHtml(name) + '</span>' +
            '</span>' +
          '</' + tag + '>';
        }
        var tagItems = [];
        if (p.deployed_at) {
          var depParts = p.deployed_at.split('|').map(function (s) { return s.trim(); });
          if (depParts[0]) tagItems.push(pubTag('production', 'Deployed at', depParts[0], depParts[1] || '', depParts[2] || ''));
        }
        if (p.coverage && p.coverage.length) {
          p.coverage.forEach(function (c) {
            tagItems.push(pubTag('', 'Coverage', c.name, c.url, c.logo));
          });
        }
        var footerHtml = tagItems.length
          ? '<div class="pub-tags">' + tagItems.join('') + '</div>'
          : '';

        return (
          '<div class="pub-item">' +
            '<div class="pub-thumb">' + thumbHtml + '</div>' +
            '<div class="pub-body">' +
              categoryHtml +
              toplineHtml +
              '<div class="pub-title">' + renderInline(p.title) + '</div>' +
              '<div class="pub-authors">' + renderInline(p.authors || '') + '</div>' +
              summaryHtml +
              footerHtml +
            '</div>' +
          '</div>'
        );
    }

    function renderPubs(pubs) {
      var container = document.querySelector('.pub-list');
      if (!container) return;
      container.innerHTML = pubs.map(renderPubItem).join('');
    }

    function renderInterests(data) {
      var container = document.querySelector('.interests-list');
      if (!container) return;
      var section = document.querySelector('.interests-section');
      var hr = document.querySelector('.interests-hr');

      var isEmpty = data.kind === 'empty' ||
        (data.kind === 'list' && !data.items.length) ||
        (data.kind === 'prose' && !data.paragraphs.length);

      if (isEmpty) {
        if (section) section.style.display = 'none';
        if (hr) hr.style.display = 'none';
        return;
      }

      container.classList.remove('as-list', 'as-prose');

      if (data.kind === 'list') {
        container.classList.add('as-list');
        container.innerHTML = data.items.map(function (it) {
          return (
            '<div class="interest-topic">' + renderInline(it.topic) + '</div>' +
            '<div class="interest-desc">' + (it.desc ? renderInline(it.desc) : '') + '</div>'
          );
        }).join('');
      } else {
        container.classList.add('as-prose');
        container.innerHTML = data.paragraphs.map(function (p) {
          return '<p>' + renderInline(p) + '</p>';
        }).join('');
      }
    }

    function renderExperience(items) {
      var container = document.querySelector('.exp-list');
      if (!container) return;
      var section = document.querySelector('.exp-section');
      var hr = document.querySelector('.exp-hr');
      if (!items.length) {
        if (section) section.style.display = 'none';
        if (hr) hr.style.display = 'none';
        return;
      }
      var KIND_LABEL = {
        internship: 'Internship',
        research: 'Research',
        visit: 'Visiting',
        award: 'Award',
        honor: 'Honor'
      };
      container.innerHTML = items.map(function (it) {
        var kind = (it.kind || '').toLowerCase();
        var label = KIND_LABEL[kind] || (it.kind || '');
        var title = it.title || '';
        var logoHtml = it.logo
          ? '<img class="exp-org-logo" src="' + escapeHtml(it.logo) + '" alt="" aria-hidden="true">'
          : '';
        var orgInner = it.org_url
          ? '<a href="' + escapeHtml(it.org_url) + '" target="_blank" rel="noopener">' + escapeHtml(it.org || '') + '</a>'
          : escapeHtml(it.org || '');
        var orgHtml = it.org ? '<div class="exp-org">' + logoHtml + '<span>' + orgInner + '</span></div>' : '';
        var noteHtml = it.note ? '<div class="exp-note">' + renderInline(it.note) + '</div>' : '';
        var periodHtml = it.period ? '<span class="exp-period">' + escapeHtml(it.period) + '</span>' : '';
        var kindHtml = label
          ? '<span class="exp-kind' + (kind === 'award' || kind === 'honor' ? ' exp-kind--accent' : '') + '">' + escapeHtml(label) + '</span>'
          : '';
        return (
          '<div class="exp-item">' +
            kindHtml +
            '<div class="exp-body">' +
              '<div class="exp-head">' +
                '<span class="exp-title">' + escapeHtml(title) + '</span>' +
                periodHtml +
              '</div>' +
              orgHtml +
              noteHtml +
            '</div>' +
          '</div>'
        );
      }).join('');
    }

    function renderLife(items) {
      var container = document.querySelector('.life-list');
      if (!container) return;
      container.innerHTML = items.map(function (item) {
        return (
          '<div class="life-item">' +
            '<div class="life-marker" aria-hidden="true"></div>' +
            '<div class="life-text">' + renderInline(item.en) + '</div>' +
          '</div>'
        );
      }).join('');
    }

    function renderContact(contact, social) {
      var section = document.querySelector('.contact-section');
      if (!section) return;
      var introEn = contact.intro_en || '';
      var links = socialLinksHtml(social);
      if (!introEn && !links) {
        section.style.display = 'none';
        var prev = section.previousElementSibling;
        if (prev && prev.tagName === 'HR') prev.style.display = 'none';
        return;
      }
      var intro = section.querySelector('.contact-intro');
      if (introEn) {
        intro.innerHTML = renderInline(introEn);
      } else {
        intro.remove();
      }
      section.querySelector('.contact-socials').innerHTML = links;
    }

    function render(data) {
      if (data.basicInfo.name) document.title = data.basicInfo.name;
      renderHero(data);
      renderResearch(data.research);
      renderInterests(data.interests);
      renderPubs(data.publications);
      renderExperience(data.experience);
      renderLife(data.life);
      renderContact(data.contact, data.social);
    }

    function showLoadError(err) {
      var box = document.createElement('div');
      box.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#d33;color:#fff;padding:12px 16px;font:14px/1.5 -apple-system,BlinkMacSystemFont,sans-serif;z-index:9999;text-align:center;';
      var msg = (err && err.message) ? err.message : String(err);
      box.innerHTML =
        '⚠️ Failed to load <code style="background:rgba(255,255,255,0.2);padding:2px 6px;border-radius:3px;">content.md</code> — ' + escapeHtml(msg) +
        '. If you opened this file directly (file://), serve the folder via a local HTTP server, e.g. <code style="background:rgba(255,255,255,0.2);padding:2px 6px;border-radius:3px;">python3 -m http.server</code>, then visit http://localhost:8000/.';
      document.body.prepend(box);
    }

    fetch('content.md', { cache: 'no-cache' })
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
      .then(function (md) { render(parseMd(md)); })
      .catch(showLoadError);
  })();

</script>

</body>
</html>
