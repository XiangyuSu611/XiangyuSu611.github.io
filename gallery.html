<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery · Xiangyu Su</title>
  <meta name="description" content="Photo plates from travels and everyday life by Xiangyu Su." />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicons/32.png" />
  <link rel="icon" type="image/png" sizes="64x64" href="assets/favicons/64.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="assets/favicons/512.png" />
  <link rel="apple-touch-icon" href="assets/favicons/apple-touch.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..900,0..100,0..1;1,9..144,300..900,0..100,0..1&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=49" />

  <script>
    // Gallery is always dark — photos breathe better on black, independent of the
    // site-wide theme preference the user picked on other pages.
    (function () {
      document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
</head>
<body class="gallery-page">

<label class="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
  <input type="checkbox" id="themeToggle">
  <span class="icon-sun">☀️</span>
  <span class="icon-moon">🌙</span>
</label>

<div class="container gallery-container">

  <nav class="notes-breadcrumb">
    <a href="index.html">Xiangyu Su</a>
    <span class="divider">⁄</span>
    <span class="current">Gallery</span>
  </nav>

  <header class="notes-header">
    <h1 class="notes-title">Gallery</h1>
  </header>

  <main class="gallery-stream"></main>

  <footer class="site-footer notes-footer">
    Xiangyu Su · 2026 · Built with <img class="claude-logo" src="assets/brands/claude-code.png" alt="" aria-hidden="true"><span class="footer-cc">Claude Code</span>
  </footer>

</div>

<!-- Lightbox overlay -->
<div class="lightbox" id="lightbox" aria-hidden="true">
  <button class="lightbox-close" aria-label="Close" type="button">&times;</button>
  <button class="lightbox-nav lightbox-prev" aria-label="Previous" type="button">&lsaquo;</button>
  <button class="lightbox-nav lightbox-next" aria-label="Next" type="button">&rsaquo;</button>
  <div class="lightbox-stage">
    <img class="lightbox-img" alt="" />
    <div class="lightbox-caption"></div>
  </div>
</div>

<script>
  var html = document.documentElement;

  requestAnimationFrame(function () {
    requestAnimationFrame(function () { html.classList.add('transitions-ready'); });
  });

  var themeCheckbox = document.getElementById('themeToggle');
  function applyTheme(t) {
    html.setAttribute('data-theme', t);
    themeCheckbox.checked = (t === 'dark');
  }
  applyTheme('dark');
  // Gallery always stays dark — local toggle flips this session only, does not persist
  themeCheckbox.addEventListener('change', function () {
    var next = this.checked ? 'dark' : 'light';
    html.setAttribute('data-theme', next);
  });

  (function () {
    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    function renderInline(s) {
      if (!s) return '';
      var out = escapeHtml(s);
      out = out.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function (_, text, url) {
        return '<a href="' + url + '" target="_blank" rel="noopener">' + text + '</a>';
      });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      out = out.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
      return out;
    }

    function parsePhotos(text) {
      if (!text) return [];
      var blocks = text.split(/\n\[\[photo\]\]\s*\n?/);
      blocks.shift();
      return blocks.map(function (block) {
        var photo = { meta: {}, body: '' };
        var lines = block.split('\n');
        var i = 0;
        for (; i < lines.length; i++) {
          var line = lines[i];
          var trimmed = line.trim();
          if (trimmed === '---') { i++; break; }
          if (trimmed === '' && Object.keys(photo.meta).length) { i++; break; }
          if (trimmed === '') continue;
          if (trimmed.charAt(0) === '#') continue;
          var m = trimmed.match(/^([a-z_]+)\s*:\s*(.*)$/i);
          if (m) photo.meta[m[1].toLowerCase()] = m[2].trim();
        }
        var bodyLines = [];
        for (; i < lines.length; i++) {
          var bl = lines[i];
          if (bl.indexOf('[[photo]]') === 0) break;
          bodyLines.push(bl);
        }
        photo.body = bodyLines.join('\n').trim();
        return photo;
      }).filter(function (p) { return p.meta.src || p.meta.title || p.meta.caption; });
    }

    function formatDate(str) {
      if (!str) return '';
      var m = str.match(/^(\d{4})[-./](\d{1,2})[-./](\d{1,2})$/);
      if (!m) return str;
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return months[parseInt(m[2],10) - 1] + ' ' + parseInt(m[3],10) + ', ' + m[1];
    }

    function renderBody(body) {
      var paras = body.split(/\n\s*\n/).map(function (p) { return p.replace(/\n/g, ' ').trim(); }).filter(Boolean);
      return paras.map(function (p) {
        return '<p>' + renderInline(p) + '</p>';
      }).join('');
    }

    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function renderGallery(photos) {
      var container = document.querySelector('.gallery-stream');
      if (!photos.length) {
        container.innerHTML = '<p class="notes-empty">No plates yet. Edit <code>gallery.md</code> to add entries.</p>';
        return;
      }
      photos.sort(function (a, b) {
        return (b.meta.date || '').localeCompare(a.meta.date || '');
      });
      var html = photos.map(function (p, idx) {
        var num = 'Plate ' + pad(idx + 1);
        var date = formatDate(p.meta.date);
        var orient = (p.meta.orient || 'landscape').toLowerCase();
        var src = p.meta.src || '';
        var alt = p.meta.title || p.meta.caption || 'Photo';

        var imageHtml = src
          ? '<img src="' + escapeHtml(src) + '" alt="' + escapeHtml(alt) + '" loading="lazy" />'
          : '<div class="plate-image-placeholder">Image pending</div>';

        var loc = p.meta.location ? escapeHtml(p.meta.location) : '';
        var primary = loc
          ? '<span class="plate-overlay-loc">' + loc + '</span>'
          : (date ? '<span class="plate-overlay-loc">' + date + '</span>' : '');
        var secondary = (loc && date) ? '<span class="plate-overlay-date">' + date + '</span>' : '';
        var overlayMeta = '<div class="plate-overlay">' + primary + secondary + '</div>';

        var delay = Math.min(idx * 40, 800) + 'ms';
        return '' +
          '<figure class="plate plate--' + orient + '" style="--stagger:' + delay + '" data-idx="' + idx + '">' +
            '<button class="plate-btn" type="button" aria-label="Open ' + escapeHtml(alt) + '">' +
              imageHtml +
              overlayMeta +
            '</button>' +
          '</figure>';
      }).join('');
      container.innerHTML = html;
      window.__galleryPhotos = photos;
    }

    fetch('gallery.md', { cache: 'no-cache' })
      .then(function (r) { return r.text(); })
      .then(function (text) {
        try { renderGallery(parsePhotos(text)); setupLightbox(); }
        catch (e) {
          document.querySelector('.gallery-stream').innerHTML =
            '<p class="notes-empty">Failed to parse gallery.md — ' + escapeHtml(e.message) + '</p>';
        }
      })
      .catch(function () {
        document.querySelector('.gallery-stream').innerHTML =
          '<p class="notes-empty">No <code>gallery.md</code> found yet.</p>';
      });

    // ── Lightbox ─────────────────────────────────────────────
    function setupLightbox() {
      var box = document.getElementById('lightbox');
      var img = box.querySelector('.lightbox-img');
      var caption = box.querySelector('.lightbox-caption');
      var stream = document.querySelector('.gallery-stream');
      var current = -1;

      function open(idx) {
        var photos = window.__galleryPhotos || [];
        if (!photos.length) return;
        current = (idx + photos.length) % photos.length;
        var p = photos[current];
        img.src = p.meta.src || '';
        img.alt = p.meta.title || p.meta.caption || '';
        var bits = [];
        if (p.meta.location) bits.push('<span class="lb-loc">' + escapeHtml(p.meta.location) + '</span>');
        if (p.meta.date) bits.push('<span>' + formatDate(p.meta.date) + '</span>');
        var meta = bits.join('<span class="lb-dot"></span>');
        var title = p.meta.title ? '<div class="lb-title">' + renderInline(p.meta.title) + '</div>' : '';
        var cap = p.meta.caption ? '<div class="lb-caption">' + renderInline(p.meta.caption) + '</div>' : '';
        caption.innerHTML = '<div class="lb-meta">' + meta + '</div>' + title + cap;
        document.body.classList.add('lightbox-open');
        box.setAttribute('aria-hidden', 'false');
      }

      function close() {
        document.body.classList.remove('lightbox-open');
        box.setAttribute('aria-hidden', 'true');
        current = -1;
      }

      function step(dir) {
        if (current < 0) return;
        open(current + dir);
      }

      stream.addEventListener('click', function (e) {
        var btn = e.target.closest('.plate-btn');
        if (!btn) return;
        var plate = btn.closest('.plate');
        var idx = parseInt(plate.getAttribute('data-idx'), 10);
        if (!isNaN(idx)) open(idx);
      });

      box.querySelector('.lightbox-close').addEventListener('click', close);
      box.querySelector('.lightbox-prev').addEventListener('click', function (e) { e.stopPropagation(); step(-1); });
      box.querySelector('.lightbox-next').addEventListener('click', function (e) { e.stopPropagation(); step(1); });
      box.addEventListener('click', function (e) {
        if (e.target === box || e.target.classList.contains('lightbox-stage')) close();
      });
      document.addEventListener('keydown', function (e) {
        if (!document.body.classList.contains('lightbox-open')) return;
        if (e.key === 'Escape') close();
        else if (e.key === 'ArrowLeft') step(-1);
        else if (e.key === 'ArrowRight') step(1);
      });
    }
  })();
</script>

</body>
</html>
